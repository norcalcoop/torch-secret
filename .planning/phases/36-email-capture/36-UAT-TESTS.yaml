phase: 36-email-capture
app: http://torchsecret.localhost:1355
failures_dir: .planning/phases/36-email-capture/uat-failures

tests:

  # Test 1: In-flight state — mock fetch to hang so we can catch the "Joining..." state
  - name: "Email form in-flight state"
    steps:
      - open {app}/
      - wait --load networkidle --timeout 10000
      - 'eval "window._orig=window.fetch.bind(window);window.fetch=function(u,o){return String(u).includes(''/api/subscribers'')?new Promise(function(){}):window._orig(u,o);}"'
      - fill "#email-capture" "uat-inflight-36@test.local"
      - click "#email-consent"
      - find role button click --name "Join the list"
      - wait 300
    assertions:
      - type: eval_contains
        js: "document.querySelector('button[type=submit]')?.textContent ?? 'NOT_FOUND'"
        expected: "Joining..."
      - type: eval_contains
        js: "String(document.querySelector('button[type=submit]')?.disabled)"
        expected: "true"

  # Test 2: Success message — real API call; mock cleared by open {app}/
  - name: "Form success message"
    steps:
      - open {app}/
      - wait --load networkidle --timeout 10000
      - fill "#email-capture" "uat-ecap-form@test.local"
      - click "#email-consent"
      - find role button click --name "Join the list"
      - wait --text "Check your inbox" --timeout 10000
    assertions:
      - type: text_present
        expected: "Check your inbox"
      - type: eval_contains
        js: "document.querySelector('#app')?.innerText ?? 'NOT_FOUND'"
        expected: "uat-ecap-form@test.local"

  # Test 3: Consent enforcement — submit without checking consent checkbox
  - name: "Consent enforcement"
    steps:
      - open {app}/
      - wait --load networkidle --timeout 10000
      - fill "#email-capture" "uat-consent-test@test.local"
      - find role button click --name "Join the list"
      - wait 500
    assertions:
      - type: text_present
        expected: "Please check the consent box to continue."
      - type: eval_contains
        js: "String(document.querySelector('button[type=submit]')?.disabled)"
        expected: "false"

  # Test 4: Confirm success state — uses a real, unexpired token seeded before this run
  # Token: slwMzUj5YM8WtixL18Exy (created for uat-confirm-36b@test.local, expires 2026-02-27)
  - name: "Confirm page — success state"
    steps:
      - open {app}/confirm?token=slwMzUj5YM8WtixL18Exy
      - wait --load networkidle --timeout 15000
      - "wait --text \"You're on the list!\" --timeout 10000"
    assertions:
      - type: text_present
        expected: "You're on the list!"
      - type: text_present
        expected: "Try Torch Secret"

  # Test 5: Confirm expired state — fake token triggers 410 → expired UI
  - name: "Confirm page — expired state"
    steps:
      - open {app}/confirm?token=completely-fake-token-uat-36
      - wait --load networkidle --timeout 10000
      - wait --text "Confirmation link expired" --timeout 10000
    assertions:
      - type: text_present
        expected: "Confirmation link expired"
      - type: text_present
        expected: "Back to homepage"

  # Test 6: Unsubscribe page — always shows success (idempotent, no "are you sure")
  - name: "Unsubscribe page"
    steps:
      - open {app}/unsubscribe?token=any-fake-unsubscribe-token
      - wait --load networkidle --timeout 10000
    assertions:
      - type: text_present
        expected: "You've been unsubscribed"
      - type: text_present
        expected: "Back to homepage"
      - type: eval_not_contains
        js: "document.body?.innerText ?? ''"
        expected: "Are you sure"

  # Test 7a: NOINDEX meta tag on /confirm (client-side, set by SPA router)
  # Note: X-Robots-Tag header is set by Express in production; covered by server unit tests.
  - name: "NOINDEX meta tag on /confirm"
    steps:
      - open {app}/confirm
      - wait --load networkidle --timeout 10000
    assertions:
      - type: eval_contains
        js: "document.querySelector('meta[name=\"robots\"]')?.content ?? 'NOT_FOUND'"
        expected: "noindex"

  # Test 7b: NOINDEX meta tag on /unsubscribe (client-side, set by SPA router)
  - name: "NOINDEX meta tag on /unsubscribe"
    steps:
      - open {app}/unsubscribe
      - wait --load networkidle --timeout 10000
    assertions:
      - type: eval_contains
        js: "document.querySelector('meta[name=\"robots\"]')?.content ?? 'NOT_FOUND'"
        expected: "noindex"
