phase: 34.1-passphrase-password-tier-enforcement
app: http://torchsecret.localhost:1355
failures_dir: .planning/phases/34.1-passphrase-password-tier-enforcement/uat-failures

tests:
  # ── Test 1: Anonymous User – Protection Panel Lock Indicators ─────────────
  # Passphrase tab = "Free" locked (aria-disabled). Generate + Custom = "Pro" locked.
  # "No protection" tab is default active. Clicking a locked tab does NOT activate it.

  - name: "Test 1a: Anonymous – passphrase has Free badge, generate/custom have Pro badge"
    steps:
      - open {app}/create
      - wait --load networkidle --timeout 10000
    assertions:
      # Passphrase tab is locked with "Free" badge
      - { type: eval_equals, js: "document.querySelector('#tab-btn-passphrase')?.getAttribute('aria-disabled') ?? 'NOT_FOUND'", expected: "true" }
      - { type: eval_contains, js: "document.querySelector('#tab-btn-passphrase')?.textContent ?? 'NOT_FOUND'", expected: "Free" }
      # Generate tab is locked with "Pro" badge
      - { type: eval_equals, js: "document.querySelector('#tab-btn-generate')?.getAttribute('aria-disabled') ?? 'NOT_FOUND'", expected: "true" }
      - { type: eval_contains, js: "document.querySelector('#tab-btn-generate')?.textContent ?? 'NOT_FOUND'", expected: "Pro" }
      # Custom tab is locked with "Pro" badge
      - { type: eval_equals, js: "document.querySelector('#tab-btn-custom')?.getAttribute('aria-disabled') ?? 'NOT_FOUND'", expected: "true" }
      - { type: eval_contains, js: "document.querySelector('#tab-btn-custom')?.textContent ?? 'NOT_FOUND'", expected: "Pro" }
      # "No protection" tab is the default active tab
      - { type: eval_equals, js: "document.querySelector('#tab-btn-none')?.getAttribute('aria-selected') ?? 'NOT_FOUND'", expected: "true" }

  - name: "Test 1b: Anonymous – clicking locked tab does not activate it"
    steps:
      - open {app}/create
      - wait --load networkidle --timeout 10000
    assertions:
      # Click the locked generate tab via JS (bypasses Playwright aria-disabled actionability guard).
      # The click handler opens the popover but does NOT call activateTab(), so none stays selected.
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-generate')?.click(); return document.querySelector('#tab-btn-none')?.getAttribute('aria-selected') ?? 'NOT_FOUND'; })()", expected: "true" }
      - { type: eval_equals, js: "document.querySelector('#tab-btn-generate')?.getAttribute('aria-selected') ?? 'NOT_FOUND'", expected: "false" }

  # ── Test 2: Locked Tab Popover CTA ────────────────────────────────────────
  # Clicking a locked tab shows a popover with a CTA link.
  # Passphrase is "free"-locked for anon → CTA → /register.
  # Generate is "pro"-locked for anon → CTA → /pricing.

  - name: "Test 2a: Anonymous – clicking passphrase tab shows popover with register CTA"
    steps:
      - open {app}/create
      - wait --load networkidle --timeout 10000
    assertions:
      # Click via JS, then verify popover is visible and CTA href is /register
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-passphrase')?.click(); return String(document.querySelector('#lock-popover-passphrase')?.hidden ?? 'NOT_FOUND'); })()", expected: "false" }
      - { type: eval_contains, js: "document.querySelector('#lock-popover-passphrase a')?.textContent ?? 'NOT_FOUND'", expected: "Sign up free" }
      - { type: eval_contains, js: "document.querySelector('#lock-popover-passphrase a')?.getAttribute('href') ?? 'NOT_FOUND'", expected: "/register" }

  - name: "Test 2b: Anonymous – generate tab (Pro-locked) popover CTA links to /pricing"
    steps:
      - open {app}/create
      - wait --load networkidle --timeout 10000
    assertions:
      # Click generate tab via JS, verify Pro popover visible with /pricing CTA
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-generate')?.click(); return String(document.querySelector('#lock-popover-generate')?.hidden ?? 'NOT_FOUND'); })()", expected: "false" }
      - { type: eval_contains, js: "document.querySelector('#lock-popover-generate a')?.textContent ?? 'NOT_FOUND'", expected: "Upgrade" }
      - { type: eval_contains, js: "document.querySelector('#lock-popover-generate a')?.getAttribute('href') ?? 'NOT_FOUND'", expected: "/pricing" }

  # ── Setup: Login as Free User (creates auth state for tests 3, 4, 6) ──────

  - name: "Setup: Login as Free User"
    steps:
      - close
      - open {app}/login
      - wait --load networkidle --timeout 10000
      - find label "Email" fill "uat-browser-free@test.local"
      - fill "#login-password" "UATpass99"
      - click "button[type=submit]"
      - wait --load networkidle --timeout 15000
      - state save e2e/uat-auth-session.json
    assertions:
      - { type: url_contains, expected: "/dashboard" }

  # ── Test 3: Arrow Key Skips Locked Tabs ───────────────────────────────────
  # Free user: unlockedTabs = ['none', 'passphrase']. ArrowRight from 'none'
  # must jump to 'passphrase' (skipping Pro-locked generate + custom tabs).

  - name: "Test 3: Free User – ArrowRight skips locked tabs, lands on Passphrase"
    steps:
      - close
      - state load e2e/uat-auth-session.json
      - open {app}/create
      - wait --load networkidle --timeout 15000
      - wait 2000
    assertions:
      # Focus #tab-btn-none, dispatch ArrowRight (bubbles to tablist keydown listener).
      # unlockedTabs=['none','passphrase'] for free user → next unlocked after 'none' is 'passphrase'.
      - { type: eval_equals, js: "(()=>{ var nb=document.querySelector('#tab-btn-none'); if(!nb) return 'NO_NB'; nb.focus(); nb.dispatchEvent(new KeyboardEvent('keydown',{key:'ArrowRight',bubbles:true})); return document.querySelector('#tab-btn-passphrase')?.getAttribute('aria-selected')??'NOT_FOUND'; })()", expected: "true" }

  # ── Test 4: Free User – Passphrase Unlocked, Generate/Custom Still Locked ─

  - name: "Test 4: Free User – passphrase tab unlocked, password tabs still Pro-locked"
    steps:
      - close
      - state load e2e/uat-auth-session.json
      - open {app}/create
      - wait --load networkidle --timeout 15000
      - wait 2000
    assertions:
      # Passphrase tab is NOT locked (aria-disabled absent → getAttribute returns null, not "true")
      - { type: eval_not_contains, js: "document.querySelector('#tab-btn-passphrase')?.getAttribute('aria-disabled') ?? 'null'", expected: "true" }
      # Passphrase tab can be activated (click → aria-selected="true")
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-passphrase')?.click(); return document.querySelector('#tab-btn-passphrase')?.getAttribute('aria-selected') ?? 'NOT_FOUND'; })()", expected: "true" }
      # Generate tab remains locked with "Pro" badge
      - { type: eval_equals, js: "document.querySelector('#tab-btn-generate')?.getAttribute('aria-disabled') ?? 'NOT_FOUND'", expected: "true" }
      - { type: eval_contains, js: "document.querySelector('#tab-btn-generate')?.textContent ?? 'NOT_FOUND'", expected: "Pro" }
      # Custom tab remains locked with "Pro" badge
      - { type: eval_equals, js: "document.querySelector('#tab-btn-custom')?.getAttribute('aria-disabled') ?? 'NOT_FOUND'", expected: "true" }
      - { type: eval_contains, js: "document.querySelector('#tab-btn-custom')?.textContent ?? 'NOT_FOUND'", expected: "Pro" }

  # ── Setup: Login as Pro User (creates auth state for test 5) ──────────────

  - name: "Setup: Login as Pro User"
    steps:
      - close
      - open {app}/login
      - wait --load networkidle --timeout 10000
      - find label "Email" fill "uat-browser-pro@test.local"
      - fill "#login-password" "UATpass99"
      - click "button[type=submit]"
      - wait --load networkidle --timeout 15000
      - state save e2e/uat-pro-session.json
    assertions:
      - { type: url_contains, expected: "/dashboard" }

  # ── Test 5: Pro User – All Tabs Unlocked ─────────────────────────────────

  - name: "Test 5: Pro User – all protection tabs unlocked and activatable"
    steps:
      - close
      - state load e2e/uat-pro-session.json
      - open {app}/create
      - wait --load networkidle --timeout 15000
      - wait 2000
    assertions:
      # No tab has aria-disabled="true"
      - { type: eval_not_contains, js: "document.querySelector('#tab-btn-passphrase')?.getAttribute('aria-disabled') ?? 'null'", expected: "true" }
      - { type: eval_not_contains, js: "document.querySelector('#tab-btn-generate')?.getAttribute('aria-disabled') ?? 'null'", expected: "true" }
      - { type: eval_not_contains, js: "document.querySelector('#tab-btn-custom')?.getAttribute('aria-disabled') ?? 'null'", expected: "true" }
      # Each tab activates on click (passphrase → generate → custom in sequence, each checked after its own click)
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-passphrase')?.click(); return document.querySelector('#tab-btn-passphrase')?.getAttribute('aria-selected') ?? 'NOT_FOUND'; })()", expected: "true" }
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-generate')?.click(); return document.querySelector('#tab-btn-generate')?.getAttribute('aria-selected') ?? 'NOT_FOUND'; })()", expected: "true" }
      - { type: eval_equals, js: "(()=>{ document.querySelector('#tab-btn-custom')?.click(); return document.querySelector('#tab-btn-custom')?.getAttribute('aria-selected') ?? 'NOT_FOUND'; })()", expected: "true" }

  # ── Test 6: Create Secret with Passphrase Protection ──────────────────────
  # Free user: passphrase tab is UNLOCKED → click via normal step (no aria-disabled issue).
  # Submit form → confirmation page shows share URL containing /secret/.

  - name: "Test 6: Free User – create secret with passphrase, confirmation shown"
    steps:
      - close
      - state load e2e/uat-auth-session.json
      - open {app}/create
      - wait --load networkidle --timeout 15000
      - wait 2000
      - find role tab click --name "Passphrase"
      - find label "Your secret" fill "UAT test secret - safe to delete"
      - find role button click --name "Create Secure Link"
      - wait --load networkidle --timeout 15000
    assertions:
      - { type: eval_contains, js: "document.querySelector('h1')?.textContent ?? 'NOT_FOUND'", expected: "Your Secure Link is Ready" }
      - { type: eval_contains, js: "document.body.innerText", expected: "/secret/" }
