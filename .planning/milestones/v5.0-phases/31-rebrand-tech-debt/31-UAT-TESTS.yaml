phase: 31-rebrand-tech-debt
app: http://torch-secret.localhost:1355
failures_dir: .planning/uat-failures

tests:
  # Test 1: Site Title and Header Wordmark
  # Source: client/src/router.ts → updatePageMeta({ title: 'Torch Secret — Zero-Knowledge Secret Sharing', ... })
  #         document.title format: "${meta.title} - Torch Secret"
  #         client/src/components/layout.ts → brand <a href="/"> contains <span class="font-heading font-semibold text-lg">
  #           with textContent = 'Torch Secret'. No id on span; located via #site-header a[href="/"] span
  - name: "Site Title and Header Wordmark"
    steps:
      - open {app}/
      - wait --load networkidle --timeout 10000
    assertions:
      - { type: eval_contains,     js: "document.title", expected: "Torch Secret" }
      - { type: eval_not_contains, js: "document.title", expected: "SecureShare" }
      - { type: eval_contains,     js: "document.querySelector('#site-header a[href=\"/\"] span')?.textContent ?? 'NOT_FOUND'", expected: "Torch Secret" }
      - { type: eval_not_contains, js: "document.querySelector('#site-header a[href=\"/\"] span')?.textContent ?? ''", expected: "SecureShare" }

  # Test 2: Terms Page Text
  # Source: client/src/pages/terms.ts → h1 "Terms of Service"; body paragraphs reference "Torch Secret" throughout
  #         router.ts: /terms renders renderTermsPage with noindex: true
  - name: "Terms Page Text"
    steps:
      - open {app}/terms
      - wait --load networkidle --timeout 10000
    assertions:
      - { type: eval_contains,     js: "document.body.innerText", expected: "Torch Secret" }
      - { type: eval_not_contains, js: "document.body.innerText", expected: "SecureShare" }

  # Test 3: Privacy Page Text
  # Source: client/src/pages/privacy.ts → h1 "Privacy Policy"; section "Who We Are" references "Torch Secret"
  #         router.ts: /privacy renders renderPrivacyPage with noindex: true
  - name: "Privacy Page Text"
    steps:
      - open {app}/privacy
      - wait --load networkidle --timeout 10000
    assertions:
      - { type: eval_contains,     js: "document.body.innerText", expected: "Torch Secret" }
      - { type: eval_not_contains, js: "document.body.innerText", expected: "SecureShare" }

  # Test 4: Protection Panel in Light Mode
  # Source: client/src/pages/create.ts → createProtectionPanel() is always rendered (not collapsible).
  #   tabDefs: [{ id: 'none', label: 'No protection' }, { id: 'generate', label: 'Generate password' },
  #             { id: 'custom', label: 'Custom password' }, { id: 'passphrase', label: 'Passphrase' }]
  #   tabList: role="tablist" aria-label="Protection mode"
  # Source: theme.ts — localStorage key 'theme', value 'light' forces light mode on page load.
  #   Light mode means document.documentElement does NOT have class 'dark'.
  # Decision: setup_js sets localStorage before the page loads (more reliable than clicking
  #   the theme toggle, which cycles through states and changes aria-label on each click).
  - name: "Protection Panel in Light Mode"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - open {app}/create
      - wait --load networkidle --timeout 10000
    assertions:
      - { type: eval_equals,   js: "localStorage.getItem('theme')", expected: "light" }
      - { type: eval_equals,   js: "document.documentElement.classList.contains('dark') ? 'dark' : 'light'", expected: "light" }
      - { type: eval_contains, js: "document.querySelector('[role=\"tablist\"][aria-label=\"Protection mode\"]')?.textContent ?? 'NOT_FOUND'", expected: "No protection" }
      - { type: eval_contains, js: "document.querySelector('[role=\"tablist\"][aria-label=\"Protection mode\"]')?.textContent ?? 'NOT_FOUND'", expected: "Generate password" }
      - { type: eval_contains, js: "document.querySelector('[role=\"tablist\"][aria-label=\"Protection mode\"]')?.textContent ?? 'NOT_FOUND'", expected: "Custom password" }
      - { type: eval_contains, js: "document.querySelector('[role=\"tablist\"][aria-label=\"Protection mode\"]')?.textContent ?? 'NOT_FOUND'", expected: "Passphrase" }

  # Test 5a: Noindex on /privacy
  # UAT item mentions "X-Robots-Tag response header". In the Vite dev environment, /privacy is
  # served by Vite (not Express), so the Express middleware that sets X-Robots-Tag (app.ts:136-140)
  # is not active. The DOM meta tag is the authoritative dev-testable signal.
  # X-Robots-Tag can only be verified against the production/Express-served build.
  # Source: router.ts → updatePageMeta({ noindex: true }) → robotsEl.content = 'noindex, nofollow'
  - name: "Noindex on /privacy"
    steps:
      - open {app}/privacy
      - wait --load networkidle --timeout 10000
    assertions:
      - { type: eval_contains, js: "document.querySelector('meta[name=\"robots\"]')?.content ?? 'NOT_FOUND'", expected: "noindex" }

  # Test 5b: Noindex on /terms
  # Source: router.ts → updatePageMeta({ noindex: true }) for /terms → same mechanism as /privacy
  - name: "Noindex on /terms"
    steps:
      - open {app}/terms
      - wait --load networkidle --timeout 10000
    assertions:
      - { type: eval_contains, js: "document.querySelector('meta[name=\"robots\"]')?.content ?? 'NOT_FOUND'", expected: "noindex" }
