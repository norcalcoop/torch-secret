phase: 32-marketing-homepage-create-split
app: http://torch-secret.localhost:1355
failures_dir: .planning/phases/32-marketing-homepage-create-split/uat-failures

tests:

  - name: "1. Homepage Route"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_contains
        js: "document.querySelector('h1')?.textContent ?? 'MISSING'"
        expected: "Share sensitive info in seconds"
      - type: eval_equals
        js: "String(document.querySelector('textarea') === null)"
        expected: "true"

  - name: "2. Create Route"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/create"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_equals
        js: "String(document.querySelector('#secret-text') !== null)"
        expected: "true"
      - type: eval_contains
        js: "document.querySelector('#secret-text')?.tagName ?? 'MISSING'"
        expected: "TEXTAREA"
      - type: eval_contains
        js: "Array.from(document.querySelectorAll('button[type=\\'submit\\']')).map(b=>b.textContent).join(',')"
        expected: "Create Secure Link"
      - type: url_contains
        expected: "/create"

  - name: "3. Pricing Route"
    # NOTE: Phase 33 implemented the full pricing page; /pricing no longer shows a stub.
    # Updated assertion reflects actual shipped state.
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/pricing"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: url_contains
        expected: "/pricing"
      - type: eval_contains
        js: "document.querySelector('h1')?.textContent ?? 'MISSING'"
        expected: "Simple, transparent pricing"

  - name: "4. Hero Section"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_contains
        js: "document.querySelector('h1')?.textContent ?? 'MISSING'"
        expected: "Share sensitive info in seconds"
      - type: eval_equals
        js: "String(document.querySelector('p') !== null)"
        expected: "true"
      - type: eval_contains
        js: "document.querySelector(\"a[href='/create']\")?.textContent ?? 'MISSING'"
        expected: "Create a Secret"

  - name: "4b. Hero CTA navigates to /create"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
      - "eval \"document.querySelector('section a[href=\\\"/create\\\"]').click()\""
      - "wait --load networkidle --timeout 5000"
    assertions:
      - type: url_contains
        expected: "/create"

  - name: "5. Trust Strip"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_contains
        js: "document.body.innerText"
        expected: "AES-256-GCM Encryption"
      - type: eval_contains
        js: "document.body.innerText"
        expected: "Zero-Knowledge"
      - type: eval_contains
        js: "document.body.innerText"
        expected: "Self-Destructs After One View"

  - name: "6. Use-Case Cards"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_contains
        js: "Array.from(document.querySelectorAll('h3')).map(h=>h.textContent).join(',')"
        expected: "Passwords"
      - type: eval_contains
        js: "Array.from(document.querySelectorAll('h3')).map(h=>h.textContent).join(',')"
        expected: "API Keys"
      - type: eval_contains
        js: "Array.from(document.querySelectorAll('h3')).map(h=>h.textContent).join(',')"
        expected: "Sensitive Notes"

  - name: "7. Email Form — Consent Validation"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
      - "eval \"document.getElementById('email-capture').value = 'test@example.com'\""
      - "eval \"document.getElementById('email-capture').closest('form').requestSubmit()\""
      - "wait 500"
    assertions:
      - type: eval_equals
        js: "String(document.getElementById('email-error')?.classList.contains('hidden') ?? true)"
        expected: "false"
      - type: eval_contains
        js: "document.getElementById('email-error')?.textContent ?? 'MISSING'"
        expected: "consent box"

  - name: "8. Email Form — Valid Submission"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
      - "eval \"document.getElementById('email-capture').value = 'test@example.com'\""
      - "eval \"document.getElementById('email-consent').checked = true\""
      - "eval \"document.getElementById('email-capture').closest('form').requestSubmit()\""
      - "wait 2000"
    assertions:
      - type: eval_contains
        js: "document.body.innerText"
        expected: "on the list"
      - type: eval_equals
        js: "document.getElementById('email-capture')?.value ?? 'MISSING'"
        expected: ""

  # Desktop nav tests — default agent-browser viewport is desktop-sized (≥640px)
  - name: "9. Desktop Navigation"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_contains
        js: "document.querySelector('#site-header')?.innerText ?? 'MISSING'"
        expected: "Torch Secret"
      - type: eval_contains
        js: "document.querySelector('#site-header')?.innerText ?? 'MISSING'"
        expected: "Pricing"
      - type: eval_contains
        js: "document.querySelector('#nav-auth-link')?.textContent ?? 'MISSING'"
        expected: "Login"
      - type: eval_contains
        js: "document.querySelector('#nav-create-link')?.textContent ?? 'MISSING'"
        expected: "Create a Secret"

  - name: "10. Create CTA Hidden on /create"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/create"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_not_contains
        js: "document.querySelector('#nav-create-link')?.className ?? ''"
        expected: "sm:block"

  - name: "10b. Create CTA Visible on Other Pages"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_contains
        js: "document.querySelector('#nav-create-link')?.className ?? ''"
        expected: "sm:block"

  # Mobile viewport tests
  - name: "11. Mobile Tab Bar"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "set viewport 390 844"
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
    assertions:
      - type: eval_equals
        js: "String(document.querySelector('#mobile-tab-bar') !== null)"
        expected: "true"
      - type: eval_contains
        js: "document.querySelector('#mobile-tab-bar')?.innerText ?? 'MISSING'"
        expected: "Home"
      - type: eval_contains
        js: "document.querySelector('#mobile-tab-bar')?.innerText ?? 'MISSING'"
        expected: "Create"
      - type: eval_contains
        js: "document.querySelector('#mobile-tab-bar')?.innerText ?? 'MISSING'"
        expected: "Pricing"
      - type: eval_contains
        js: "document.querySelector('#mobile-tab-bar')?.innerText ?? 'MISSING'"
        expected: "Dashboard"
      - type: eval_contains
        js: "document.querySelector('#mobile-tab-bar button.text-accent')?.getAttribute('aria-label') ?? 'NOT_FOUND'"
        expected: "Home"

  - name: "12. Footer Visibility on Mobile"
    setup_js: "localStorage.setItem('theme', 'light')"
    steps:
      - "set viewport 390 844"
      - "open {app}/"
      - "wait --load networkidle --timeout 10000"
      - "eval \"document.getElementById('site-footer').scrollIntoView({behavior:'instant'})\""
      - "wait 500"
    assertions:
      - type: eval_contains
        js: "document.querySelector('#site-footer')?.innerText ?? 'MISSING'"
        expected: "Privacy Policy"
      - type: eval_contains
        js: "document.querySelector('#site-footer')?.innerText ?? 'MISSING'"
        expected: "Zero-knowledge encryption"
