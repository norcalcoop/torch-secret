services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: secureshare
      POSTGRES_PASSWORD: secureshare
      POSTGRES_DB: secureshare
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U secureshare']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    init: true
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://secureshare:secureshare@db:5432/secureshare
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      FORCE_HTTPS: 'false'
      PORT: '3000'
      LOG_LEVEL: info
      # --- Auth (required by Zod; replace with real values to test auth locally) ---
      BETTER_AUTH_SECRET: 'local-development-secret-must-be-at-least-32-chars'
      BETTER_AUTH_URL: 'http://localhost:3000'
      # --- Email (placeholder satisfies z.string().min(1); emails won't deliver) ---
      RESEND_API_KEY: 'placeholder-not-sent-in-docker-local-dev'
      RESEND_FROM_EMAIL: 'Torch Secret <noreply@localhost>'
      # --- OAuth (commented out; buttons won't appear — correct for local dev) ---
      # GOOGLE_CLIENT_ID:
      # GOOGLE_CLIENT_SECRET:
      # GITHUB_CLIENT_ID:
      # GITHUB_CLIENT_SECRET:
      # --- PostHog is a build-time var; set VITE_POSTHOG_KEY before docker build ---
      # VITE_POSTHOG_KEY is baked in during docker build — not a runtime env var
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        'sh',
        '-c',
        'node --import tsx server/src/db/migrate.ts && node --import tsx server/src/server.ts',
      ]

volumes:
  pgdata:
