<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OG Concept C — Classified Burn</title>
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('../../node_modules/@fontsource-variable/jetbrains-mono/files/jetbrains-mono-latin-wght-normal.woff2')
          format('woff2');
        font-weight: 100 900;
        font-style: normal;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .preview-wrapper {
        min-height: 100vh;
        background: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .og-canvas {
        width: 1200px;
        height: 630px;
        background: #0f0d14;
        font-family: 'JetBrains Mono', monospace;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        flex-shrink: 0;
      }

      /* Noise grain overlay */
      .og-canvas::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 1;
      }

      /* Document card */
      .doc {
        position: relative;
        width: 880px;
        height: 500px;
        background: #13111c;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 48px 64px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 40px 100px rgba(0, 0, 0, 0.7);
        z-index: 2;
        display: flex;
        flex-direction: column;
      }

      /* Document header row */
      .doc-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 36px;
        flex-shrink: 0;
      }

      .doc-meta {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        line-height: 1.8;
      }

      .doc-id {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.15);
        letter-spacing: 0.08em;
        text-align: right;
        line-height: 1.8;
      }

      /* Red classification stamp */
      .stamp {
        position: absolute;
        top: 52px;
        right: 56px;
        border: 3px solid rgba(220, 50, 50, 0.65);
        padding: 6px 18px;
        transform: rotate(-8deg);
        font-size: 21px;
        letter-spacing: 0.25em;
        color: rgba(220, 50, 50, 0.65);
        text-transform: uppercase;
        font-weight: 700;
        pointer-events: none;
        z-index: 10;
      }

      /* Redacted content */
      .redacted-section {
        margin-bottom: 28px;
        flex-shrink: 0;
      }

      .redact-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .redact-bar {
        height: 16px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 2px;
        margin-bottom: 7px;
      }

      .redact-bar.short {
        width: 43%;
      }
      .redact-bar.medium {
        width: 68%;
      }
      .redact-bar.long {
        width: 88%;
      }
      .redact-bar.full {
        width: 100%;
      }

      /* Horizontal divider */
      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        margin: 20px 0;
        flex-shrink: 0;
      }

      /* Brand block */
      .brand-section {
        flex-shrink: 0;
      }

      .brand-name {
        font-size: 50px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.01em;
        line-height: 1;
        margin-bottom: 8px;
      }

      .brand-tagline {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* Bottom bar */
      .bottom-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .url {
        font-size: 13px;
        color: #4d8bf5;
        opacity: 0.6;
        letter-spacing: 0.03em;
      }

      .pills {
        display: flex;
        gap: 8px;
      }

      .pill {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 3px 10px;
        border-radius: 100px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* Burn glow at bottom-right corner of doc */
      .burn-glow {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 300px;
        height: 220px;
        background: radial-gradient(
          ellipse at 100% 100%,
          rgba(255, 120, 0, 0.14) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      /* Floating flame overlapping card bottom-right edge */
      .flame-float {
        position: absolute;
        bottom: 56px;
        right: 142px;
        width: 96px;
        height: 96px;
        color: #ff9f1c;
        filter: drop-shadow(0 0 24px rgba(255, 159, 28, 0.9))
          drop-shadow(0 0 64px rgba(255, 80, 0, 0.5));
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div class="preview-wrapper">
      <div class="og-canvas">
        <div class="doc">
          <div class="doc-header">
            <div class="doc-meta">
              CLASSIFICATION: TOP SECRET<br />
              DISTRIBUTION: NEED TO KNOW<br />
              RETENTION: ONE VIEW ONLY
            </div>
            <div class="doc-id">
              REF: TS-x7mK9p2qR<br />
              EXPIRES: ON READ<br />
              ENCRYPTED: AES-256-GCM
            </div>
          </div>

          <div class="stamp">CLASSIFIED</div>

          <div class="redacted-section">
            <div class="redact-label">Message Content</div>
            <div class="redact-bar full"></div>
            <div class="redact-bar long"></div>
            <div class="redact-bar medium"></div>
            <div class="redact-bar short"></div>
          </div>

          <div class="divider"></div>

          <div class="brand-section">
            <div class="brand-name">Torch Secret</div>
            <div class="brand-tagline">Secrets that burn after reading</div>
          </div>

          <div class="divider"></div>

          <div class="bottom-bar">
            <div class="url">torchsecret.com</div>
            <div class="pills">
              <div class="pill">Zero-knowledge</div>
              <div class="pill">No accounts</div>
              <div class="pill">Self-destruct</div>
            </div>
          </div>

          <div class="burn-glow"></div>
        </div>

        <!-- Flame overlapping bottom-right of document card -->
        <svg
          class="flame-float"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"
          />
        </svg>
      </div>
    </div>
  </body>
</html>
