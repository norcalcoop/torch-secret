# Render.com Blueprint — one-click deployment for Torch Secret
# Deploy: https://render.com/deploy → import this repo
#
# Free tier notes:
# - Free PostgreSQL expires after 30 days (14-day grace period to upgrade)
# - Free Redis data is ephemeral (lost on restart; rate limit counters reset)
# - Free web services spin down after 15 minutes of inactivity (~60s cold start)
#
# IMPORTANT: After initial Blueprint sync, manually add all secret env vars
# (marked sync:false) in the Render dashboard. See README for required values and how to generate them.

services:
  # Web service — Docker-based Node.js application
  - type: web
    name: torch-secret
    runtime: docker
    plan: free
    region: oregon
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    dockerCommand: "./scripts/start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: torch-secret-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: torch-secret-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: FORCE_HTTPS
        value: 'true'
      - key: LOG_LEVEL
        value: info

      # === Authentication (required) ===
      # Generate with: openssl rand -base64 32
      - key: BETTER_AUTH_SECRET
        sync: false
      # Set to your Render service URL, e.g. https://torchsecret.onrender.com (no trailing slash)
      - key: BETTER_AUTH_URL
        sync: false

      # === Email delivery via Resend (required for email auth features) ===
      - key: RESEND_API_KEY
        sync: false
      # Format: "Torch Secret <noreply@yourdomain.com>" — must use a Resend-verified domain
      - key: RESEND_FROM_EMAIL
        sync: false

      # === OAuth providers (optional — omit to disable Google/GitHub sign-in) ===
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # === Analytics (optional — PostHog baked in at build time via Docker ARG) ===
      # Setting these triggers a rebuild that bakes them into the JS bundle.
      # If unset, analytics are silently disabled (safe default).
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        sync: false

      # === Application URL ===
      # Set to your Render service URL, e.g. https://torchsecret.com (no trailing slash)
      - key: APP_URL
        sync: false
      # Comma-separated trusted origins for CSRF protection — same as APP_URL for single-domain deploys
      - key: BETTER_AUTH_TRUSTED_ORIGINS
        sync: false

      # === Loops email onboarding (Phase 37) ===
      - key: LOOPS_API_KEY
        sync: false

      # === Stripe Billing (Phase 34) ===
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false

      # === Email Capture (Phase 36) ===
      - key: RESEND_AUDIENCE_ID
        sync: false
      # Salt for SHA-256 IP hashing — generate: node -e "console.log(require('crypto').randomBytes(24).toString('hex'))"
      - key: IP_HASH_SALT
        sync: false

      # === PostHog REST API — used for scripted dashboard setup (Phase 37.1), not required at runtime ===
      # - key: POSTHOG_PERSONAL_API_KEY
      #   sync: false
      # - key: POSTHOG_PROJECT_ID
      #   sync: false

  # Redis key-value store for distributed rate limiting
  - type: keyvalue
    name: torch-secret-redis
    plan: free
    region: oregon
    ipAllowList: [] # Only accessible from Render internal network
    maxmemoryPolicy: allkeys-lru

# PostgreSQL database
databases:
  - name: torch-secret-db
    plan: free
    region: oregon
    postgresMajorVersion: '17'
