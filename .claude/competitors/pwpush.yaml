# Password Pusher (pwpush.com) — Competitor Data Profile
# Source: us.pwpush.com, docs.pwpush.com, github.com/pglombardo/PasswordPusher
# Last updated: 2026-02-21

name: Password Pusher
url: https://pwpush.com
alt_urls:
  - https://us.pwpush.com
  - https://eu.pwpush.com
tagline: "Securely share sensitive information"
open_source: true
source_repo: https://github.com/pglombardo/PasswordPusher
tech_stack: Ruby on Rails

encryption:
  model: server-side
  algorithm: AES-256-GCM (server-side)
  zero_knowledge: false
  explanation: >
    Password Pusher stores sensitive data encrypted in the database using
    AES-GCM 256-bit keys. Encryption and key management happen on the server.
    A unique encryption key is derived for each push. The server holds both
    the ciphertext and the ability to decrypt it. Plaintext is sent to the
    server before encryption. Users must trust the pwpush.com infrastructure
    or run their own self-hosted instance.
  passphrase_handling: >
    Optional passphrase adds a layer on top of server-side encryption.
    Still processed server-side.

pricing:
  free_tier:
    name: Open Source / Self-Hosted
    price: Free
    features:
      - Full open-source codebase
      - All core push features
      - Time and view-count expiration
      - Passphrases
      - REST API
    limits:
      - Requires self-hosting (Docker or Rails)
      - No file sharing, no "Requests" feature
      - No branding, no audit logs, no team features
  paid_hosted:
    premium:
      name: Premium (Individual)
      price_monthly: $19/month
      price_annual: $205/year
      features:
        - Everything in open source
        - File transmission and reception
        - One-time upload links (Requests)
        - Push and request branding
        - Custom text and logos
        - Audit logs
        - Priority support
    pro:
      name: Pro (Teams)
      price_monthly: $29/month (5 users included, $3/user additional)
      price_annual: $315/year ($30/user additional annually)
      features:
        - All Premium features
        - Team collaboration
        - Custom domain support
        - White-label branding
        - Team security policies
        - 2FA management
        - Priority support

features:
  one_time_view: true
  view_count_expiration: true
  time_expiration: true
  password_protection: true
  file_sharing: true (paid)
  audit_logs: true (paid)
  team_dashboard: true (Pro)
  api: true
  custom_domains: true (Pro)
  account_required_for_recipient: false
  self_host: true
  email_delivery: false
  requests_feature: true (paid, allows receiving sensitive data from others)
  two_factor_management: true (Pro)

strengths:
  - Excellent self-hosting story — Docker image, well-maintained, active community
  - View count expiration — unique feature (expire after N views, not just 1)
  - Audit logs — compliance-friendly for teams
  - Requests feature — lets you send a secure upload link to collect secrets from others
  - File sharing (paid) — supports binaries, not just text
  - Active development — regular updates and changelog
  - Open source with strong community (~4k+ GitHub stars)
  - Both EU and US hosted instances available

weaknesses:
  - NOT zero-knowledge — server handles plaintext before encrypting
  - Server must be trusted to protect data
  - Premium pricing ($19/month) is high for an individual
  - Pro team pricing can be complex (base + per-user)
  - No free hosted tier (must self-host for free)
  - UI is more complex — built for power users; less clean than simpler tools
  - No view receipts on self-hosted or free tier
  - No account dashboard / history for the free/open-source edition

best_for:
  - Organizations that need to self-host a fully-featured secret sharing tool
  - Compliance-driven teams who need audit logs
  - Teams that need to receive sensitive data (Requests feature)
  - DevOps/IT teams who also share files, not just text
  - Companies who need custom branding on their internal secret sharing tool

not_ideal_for:
  - Users who require true zero-knowledge (server handles plaintext)
  - Individuals who want a simple, quick tool without self-hosting
  - Organizations that need free hosted access (no free hosted tier)
  - Non-technical users (UX is more complex)

common_complaints:
  - "Still server-side encryption — not truly zero-knowledge"
  - "No free hosted option — you either pay or self-host"
  - "Premium pricing is high for individuals"
  - "UI feels dated / cluttered compared to simpler alternatives"
  - "View count expiration can be confusing for non-technical recipients"

seo_terms:
  - pwpush alternative
  - password pusher alternative
  - alternative to pwpush
  - pwpush alternatives
  - best password pusher alternatives
  - torch secret vs pwpush
  - torch secret vs password pusher

differentiation_from_torch_secret:
  encryption: >
    Password Pusher: server-side AES-256-GCM (server sees plaintext).
    Torch Secret: client-side AES-256-GCM (server sees only ciphertext, key in URL fragment).
  zero_knowledge: >
    pwpush requires trusting their server or your self-hosted instance.
    Torch Secret: mathematically impossible for the server to decrypt.
  pricing: >
    pwpush: free only if self-hosted; $19/month for hosted individuals.
    Torch Secret: free hosted tier (anonymous), $9/month Pro.
  simplicity: >
    pwpush: feature-rich but complex UI. Torch Secret: single-focus UX, one job done well.
  recipient_experience: >
    Both require no account for recipients. Identical experience at the link.
