# OneTimeSecret — Competitor Data Profile
# Source: onetimesecret.com, docs.onetimesecret.com, community research
# Last updated: 2026-02-21

name: OneTimeSecret
url: https://onetimesecret.com
tagline: "Share a secret. Once."
founded: ~2011
open_source: true
source_repo: https://github.com/onetimesecret/onetimesecret
tech_stack: Ruby on Rails

encryption:
  model: server-side
  algorithm: AES-256 (server-side, key managed by OTS)
  zero_knowledge: false
  explanation: >
    Secrets are sent to OneTimeSecret's servers as plaintext and encrypted
    server-side. The server holds both the ciphertext and the ability to
    decrypt it. Users must trust OneTimeSecret's infrastructure and access
    controls. The key never lives exclusively in the URL fragment — encryption
    happens after the plaintext reaches the server.
  passphrase_handling: >
    Passphrases are bcrypt-hashed server-side; the secret itself is encrypted
    using the passphrase but this still occurs on the server after plaintext
    delivery.

pricing:
  free_tier:
    name: Basic
    price: $0/month
    features:
      - Secret sharing (one-time links)
      - Email links to recipients
      - Automatic destruction after view
      - Multiple expiration options
      - REST API access
    limits:
      - Rate-limited
      - No custom domains
      - No custom branding
  paid_tier:
    name: Identity Plus
    price: $35/month
    features:
      - Unlimited custom domains
      - Custom branding with logo
      - Branded homepage destination
      - No rate limits
      - Privacy-first design
    focus: White-label and custom domain use cases for companies
  self_host:
    available: true
    cost: Free (open source)
    notes: Requires Ruby on Rails environment. Well-documented.

features:
  one_time_view: true
  password_protection: true
  expiration_options: true
  api: true
  custom_domains: true (paid)
  file_sharing: false
  audit_logs: false
  team_dashboard: false
  account_required_for_recipient: false
  self_host: true
  email_delivery: true

strengths:
  - Established brand — been around since ~2011, widely recognized
  - Clean, simple UX — minimal friction for both sender and recipient
  - REST API — well-documented, used in many automation workflows
  - Self-hostable — organizations can run their own instance
  - Open source — codebase is auditable
  - Strong compliance language — SOC2, GDPR, CCPA, HIPAA references
  - Email recipient feature — send secret link by email from within the product

weaknesses:
  - NOT zero-knowledge — plaintext passes through their server before encryption
  - Server holds decryption capability — requires trusting OTS infrastructure
  - No audit logs on free or mid-tier
  - No team collaboration features
  - Paid tier ($35/month) is expensive relative to feature set — it's primarily for branding
  - No file sharing
  - No view receipts

best_for:
  - Companies wanting white-labeled, branded secret-sharing URLs
  - Teams already integrated with the OTS API
  - Organizations where server-side encryption meets their compliance bar
  - Non-technical users who need the simplest possible tool
  - Self-hosters comfortable with Ruby on Rails

not_ideal_for:
  - Security teams requiring verifiable zero-knowledge architecture
  - Users who need to share secrets without trusting a third-party server
  - Teams needing audit logs, dashboards, or view receipts
  - Budget-conscious teams (paid tier is $35/month for branding-only features)

common_complaints:
  - "It's not truly zero-knowledge — the server sees your plaintext"
  - "The paid tier is expensive for what it offers (just custom domains)"
  - "No team features on any tier"
  - "No way to know if the secret was viewed"

seo_terms:
  - onetimesecret alternative
  - alternative to onetimesecret
  - onetimesecret alternatives
  - best onetimesecret alternatives
  - torch secret vs onetimesecret
  - onetimesecret zero knowledge

differentiation_from_torch_secret:
  encryption: >
    OneTimeSecret: server-side encryption (server sees plaintext).
    Torch Secret: client-side AES-256-GCM (server sees only ciphertext, key lives in URL fragment).
  zero_knowledge: >
    OneTimeSecret requires trusting their server. Torch Secret: architecturally
    impossible for the server to decrypt (URL fragment never transmitted per RFC 3986).
  pricing: >
    OTS paid tier: $35/month (branding-only). Torch Secret Pro: $9/month (history, dashboard, view receipts).
  audit_logs: >
    OTS has no audit logs on standard plans. Torch Secret Pro includes view receipts.
  team_features: >
    OTS has no team tier. Torch Secret has a Team plan at $29/month.
