name: CI

on:
  workflow_dispatch: # temporarily disabled auto-triggers; re-enable push/pull_request when ready

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: secureshare
          POSTGRES_PASSWORD: secureshare
          POSTGRES_DB: secureshare
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://secureshare:secureshare@localhost:5432/secureshare
      NODE_ENV: test
      BETTER_AUTH_SECRET: ci-test-secret-placeholder-must-be-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      RESEND_API_KEY: re_placeholder
      RESEND_FROM_EMAIL: "Torch Secret <noreply@torchsecret.com>"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: node --import tsx server/src/db/migrate.ts

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: secureshare
          POSTGRES_PASSWORD: secureshare
          POSTGRES_DB: secureshare
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://secureshare:secureshare@localhost:5432/secureshare
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      BETTER_AUTH_SECRET: ci-test-secret-placeholder-must-be-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      RESEND_API_KEY: re_placeholder
      RESEND_FROM_EMAIL: "Torch Secret <noreply@torchsecret.com>"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run database migrations
        run: node --import tsx server/src/db/migrate.ts

      - name: Run E2E tests
        run: npx playwright test --config e2e/playwright.config.ts

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --no-cache \
            --build-arg VITE_POSTHOG_KEY="" \
            --build-arg VITE_POSTHOG_HOST="" \
            -t torch-secret:ci-test \
            .
